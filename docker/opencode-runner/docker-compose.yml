services:
  opencode:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: opencode-runner
    stdin_open: true
    tty: true
    working_dir: /workspace
    volumes:
      # Mount agent directory as workspace
      - ../../agent:/workspace
      # Mount Docker socket so run_tool can spawn sibling containers
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      # API keys — set in .env file or pass directly
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      # OSINT API keys (optional)
      - HIBP_API_KEY=${HIBP_API_KEY:-}
      - SECURITYTRAILS_API_KEY=${SECURITYTRAILS_API_KEY:-}
      - HUNTER_API_KEY=${HUNTER_API_KEY:-}
      # Prevent OpenCode from using macOS-specific features
      - TERM=xterm-256color
    # On macOS (Docker Desktop/OrbStack), use bridge + extra_hosts
    # Targets on host localhost are reachable via host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
